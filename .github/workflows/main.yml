name: Windows-10-AnyDesk
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Setup AnyDesk
      shell: powershell
      run: |
        # 1. Download AnyDesk
        curl.exe -L -o anydesk.exe https://download.anydesk.com/AnyDesk.exe
        
        # 2. Set the password for unattended access
        # This sets the password to: MyRobloxBot123!
        echo "MyRobloxBot123!" | ./anydesk.exe --set-password
        
        # 3. Get the AnyDesk ID
        ./anydesk.exe --get-id | Out-File -FilePath "id.txt"
        $ID = Get-Content "id.txt"
        
        Write-Host "------------------------------------------------"
        Write-Host "YOUR ANYDESK ID IS: $ID"
        Write-Host "PASSWORD IS: MyRobloxBot123!"
        Write-Host "------------------------------------------------"

    - name: Keep Alive
      shell: powershell
      run: |
        # Run AnyDesk in the background
        Start-Process ./anydesk.exe
        
        # Keep the VM running for 6 hours
        $i = 0; while($i -le 360) { Start-Sleep -Seconds 60; $i++ }
